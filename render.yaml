services:
  - type: web
    name: new-option-technology
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: REQUEST_BODY_LIMIT
        value: 200kb
      - key: SMTP_SERVICE
        value: ""
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: NEW OPTION TECHNOLOGY
      - key: ADMIN_NAME
        value: System Administrator
      - key: ADMIN_EMAIL
        value: admin@newoptiontechnology.com
      - key: ADMIN_PHONE
        value: +250788790756
